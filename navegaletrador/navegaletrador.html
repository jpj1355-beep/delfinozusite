<!DOCTYPE html>
<html>
<head>
    <script type='text/javascript' src='javascripts/bug-min.js'></script>
<title>Letras</title>

<style class="bg">
  body {
  background-color: #111111;
  margin: 0;
  overflow-x: hidden;
}

body {
  margin: 0;
  background: url("https://wallpapers.com/images/featured/cat-g9rdx9uk2425fip2.jpg") center;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: "MS Sans Serif", Arial;
}

.browser-window {
  width: 800px;
  height: 500px;
  background: #c0c0c0;
  border: 3px solid #fff;
  outline: solid #c0c0c0;
  box-shadow: 0 0 20px #000;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Desktop */
.desktop {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* Ícones */
.icon {
  width: 80px;
  text-align: center;
  color: black;
  cursor: pointer;
  position: absolute;
}

.icon img {
  width: 32px;
}

.img-gif {
  width: 24px;
  height: 24px;
  text-align: center;
  display: block;
  position: absolute;
  }

.icon span {
  display: block;
  font-size: 12px;
}

/* Janela */
.window {
    flex: 1;
  width: 350px;
  background: #c0c0c0;
  border: 2px solid #000;
  box-shadow: inset -2px -2px #fff, inset 2px 2px #808080;
  position: absolute;
  top: 100px;
  left: 100px;
  display: none;
}

/* Barra */
.title-bar {
  background: #ffffff;
  color: white;
  padding: 2px;
  cursor: move;
  display: flex;
  justify-content: space-between;
}

/* Botão fechar */
.close {
  background: #fff;
  width: 20px;
  height: 20px;
  display: flex;
  text-align: center;
  justify-content: center;
  cursor: pointer;
}

/* Conteúdo */
.content {
  padding: 10px;
  font-size: 14px;
  font-family: ui-monospace;
}

/* Lista */
li {
  cursor: pointer;
  padding: 3px;
}

li:hover {
  background: #838383;
  color: white;
}

/* Letras */
#letras {
  margin-top: 10px;
  background: white;
  color: black;
  padding: 5px;
  border: 2px inset #808080;
  height: 120px;
  overflow-y: auto;
  white-space: pre-line;
}

/* Barra inferior */
.taskbar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 30px;
  background: #c0c0c0;
  border-top: 2px solid #fff;
  display: flex;
  align-items: center;
  padding: 3px;
}

.chaos {
  animation: flicker 0.05s infinite, shake 0.1s infinite;
}

.start {
  background: #c0c0c0;
  border: 2px solid #fff;
  border-right-color: #000;
  border-bottom-color: #000;
  padding: 2px 10px;
  font-weight: bold;
  cursor: pointer;
}

@keyframes flicker {
  0% { filter: invert(0); }
  50% { filter: invert(1); }
  100% { filter: invert(0); }
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px,-2px); }
  50% { transform: translate(-2px,2px); }
  75% { transform: translate(2px,2px); }
  100% { transform: translate(-2px,-2px); }
}

.chaos::before,
.chaos::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  mix-blend-mode: screen;
}

@keyframes glitchR {
  0% { transform: translate(0,0); }
  50% { transform: translate(4px,-3px); }
  100% { transform: translate(-4px,3px); }
}

@keyframes glitchB {
  0% { transform: translate(0,0); }
  50% { transform: translate(-4px,3px); }
  100% { transform: translate(4px,-3px); }
}

</style>
</head>
<body>

    <div class="browser-window">

<div class="desktop">

  <!-- Ícone -->
  <div class="icon" style="top:20px; left:20px;" onclick="openWindow()">
    <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
    <span>letras e tals</span>
  </div>

  <!-- Janela -->
  <div class="window" id="win">
    <div class="title-bar" id="drag">
      <span>
        <img class="Img-gif" src="https://blob.gifcities.org/gifcities/6HU7LHQZLALNQWOJXTTIBHFBNVLFKQPL.gif"style="padding-left: 10px; padding-top: 3px; display:absolute; width: 24px;"><img>
      </span>
      <div class="close" style="padding-left: 12px; padding-top: 12px; display:relative;" onclick="closeWindow()">
        <img src="https://blob.gifcities.org/gifcities/3J4YSGQLGONZ353SOSX6XE5HWH5SA2ST.gif" width="300" height="30" style="vertical-align:middle; margin: -12px -12px; padding-right: 16px; padding-top: 4px;">
      </div>
    </div>

    <div class="content">
      <ul>
        <li onclick="show(0)">Gaia.txt</li>
        <li onclick="show(1)">Outra Vez.txt</li>
        <li onclick="show(2)">musica_03.txt</li>
      </ul>

      <div id="lyrics">escolhe a música fi!</div>
    </div>
  </div>

  <div class="taskbar">
    <div class="start" onclick="toggleChaos()">
      <img src="https://blob.gifcities.org/gifcities/HSQGU7YBEPKSZQYB73IPKNQ7J4VYZG6P.gif"
    </div>
  </div>
  
</div>
</div>

<script>

  src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.0.2/jquery.min.js"
  
const win = document.getElementById("win");

/* abrir/fechar */
function openWindow() {
  win.style.display = "block";
}

function closeWindow() {
  win.style.display = "none";
}

let chaosOn = false;
let chaosInterval;

function infectElements() {
  const all = document.querySelectorAll("*");
  all.forEach(el => {
    if (Math.random() < 0.02) {
      el.style.transform = "skew(" + (Math.random()*10-5) + "deg)";
      el.style.filter = "hue-rotate(" + (Math.random()*360) + "deg)";
    }
  });
}

function toggleChaos() {
  chaosOn = !chaosOn;

  if (chaosOn) {
    document.body.classList.add("chaos");

    chaosInterval = setInterval(infectElements, 300);
    textInterval = setInterval(createGlitchText, 120);

  } else {
    document.body.classList.remove("chaos");

    clearInterval(chaosInterval);

     document.querySelectorAll("*").forEach(el => {
      el.style.transform = "";
      el.style.filter = "";
    });
  }
}

/* músicas */
const songs = [
`no silêncio da noite
as sombras falam baixo
ninguém escuta`,

`passos ecoam
numa rua vazia
eu continuo andando`,

`memórias voltam
como um erro antigo
impossível apagar`
];

function show(i) {
  document.getElementById("lyrics").innerText = songs[i];
}

/* arrastar janela */
let offsetX = 0, offsetY = 0, isDown = false;

const drag = document.getElementById("drag");

drag.addEventListener("mousedown", (e) => {
  isDown = true;
  offsetX = win.offsetLeft - e.clientX;
  offsetY = win.offsetTop - e.clientY;
});

document.addEventListener("mouseup", () => isDown = false);

document.addEventListener("mousemove", (e) => {
  if (isDown) {

    let newX = e.clientX + offsetX;
    let newY = e.clientY + offsetY;

    const maxX = 800 - win.offsetWidth;
    const maxY = 500 - win.offsetHeight;

    // trava dentro da tela
    if (newX < 0) newX = 0;
    if (newY < 0) newY = 0;
    if (newX > maxX) newX = maxX;
    if (newY > maxY) newY = maxY;

    win.style.left = newX + "px";
    win.style.top = newY + "px";

  }
});
  
</script>

</body>
</html>
