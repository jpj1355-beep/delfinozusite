@keyframes flicker {
  0% { filter: invert(0); }
  50% { filter: invert(1); }
  100% { filter: invert(0); }
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px,-2px); }
  50% { transform: translate(-2px,2px); }
  75% { transform: translate(2px,2px); }
  100% { transform: translate(-2px,-2px); }
}

.chaos::before,
.chaos::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  mix-blend-mode: screen;
}

@keyframes glitchR {

  100% { transform: translate(-4px,3px); }
}

@keyframes glitchB {
  0% { transform: translate(0,0); }
  50% { transform: translate(-4px,3px); }
  100% { transform: translate(4px,-3px); }

<script>

  src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.0.2/jquery.min.js"
  
const win = document.getElementById("win");

/* abrir/fechar */
function openWindow() {
  win.style.display = "block";
}

function closeWindow() {
  win.style.display = "none";
}

let chaosOn = false;
let chaosInterval;

function infectElements() {
  const all = document.querySelectorAll("*");
  all.forEach(el => {
    if (Math.random() < 0.02) {
      el.style.transform = "skew(" + (Math.random()*10-5) + "deg)";
      el.style.filter = "hue-rotate(" + (Math.random()*360) + "deg)";
    }
  });
}

function toggleChaos() {
  chaosOn = !chaosOn;

  if (chaosOn) {
    document.body.classList.add("chaos");

    chaosInterval = setInterval(infectElements, 300);
    textInterval = setInterval(createGlitchText, 120);

  } else {
    document.body.classList.remove("chaos");

    clearInterval(chaosInterval);

     document.querySelectorAll("*").forEach(el => {
      el.style.transform = "";
      el.style.filter = "";
    });
  }
}

/* músicas */
const songs = [
`bla`,

`bla bla`,

`bla bla bla`
];

function show(i) {
  document.getElementById("lyrics").innerText = songs[i];
}

/* arrastar janela */
let offsetX = 0, offsetY = 0, isDown = false;

const drag = document.getElementById("drag");

drag.addEventListener("mousedown", (e) => {
  isDown = true;
  offsetX = win.offsetLeft - e.clientX;
  offsetY = win.offsetTop - e.clientY;
});

document.addEventListener("mouseup", () => isDown = false);

document.addEventListener("mousemove", (e) => {
  if (isDown) {

    let newX = e.clientX + offsetX;
    let newY = e.clientY + offsetY;

    const maxX = 800 - win.offsetWidth;
    const maxY = 500 - win.offsetHeight;

    // trava dentro da tela
    if (newX < 0) newX = 0;
    if (newY < 0) newY = 0;
    if (newX > maxX) newX = maxX;
    if (newY > maxY) newY = maxY;

    win.style.left = newX + "px";
    win.style.top = newY + "px";

  }
});

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playRandomNote() {

  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  // Escala menor (A menor)
  const notes = [
    220.00, // A
    246.94, // B
    261.63, // C
    293.66, // D
    329.63, // E
    349.23, // F
    392.00  // G
  ];

  const randomNote = notes[Math.floor(Math.random() * notes.length)];

  // Oscilador base
  oscillator.type = "sawtooth"; // mais "sujo" que sine
  oscillator.frequency.setValueAtTime(randomNote, audioCtx.currentTime);

  // Filtro (efeito lo-fi)
  filter.type = "lowpass";
  filter.frequency.setValueAtTime(1200, audioCtx.currentTime);

  // Gain
  gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);

  // Conexões
  oscillator.connect(filter);
  filter.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillator.start();

  // 🎛️ GLITCH: variação rápida de pitch
  let glitch = setInterval(() => {
    oscillator.frequency.setValueAtTime(
      randomNote + (Math.random() * 10 - 5),
      audioCtx.currentTime
    );
  }, 30);

  // Fade out
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);

  oscillator.stop(audioCtx.currentTime + 0.6);

  setTimeout(() => clearInterval(glitch), 600);
}
</script>

<script>console.clear();

// Select the circle element
const circleElement = document.querySelector('.circle');

// Create objects to track mouse position and custom cursor position
const mouse = { x: 0, y: 0 }; // Track current mouse position
const previousMouse = { x: 0, y: 0 } // Store the previous mouse position
const circle = { x: 0, y: 0 }; // Track the circle position

// Initialize variables to track scaling and rotation
let currentScale = 0; // Track current scale value
let currentAngle = 0; // Track current angle value

// Update mouse position on the 'mousemove' event
window.addEventListener('mousemove', (e) => {
  mouse.x = e.x;
  mouse.y = e.y;
});

// Smoothing factor for cursor movement speed (0 = smoother, 1 = instant)
const speed = 0.27;

// Start animation
const tick = (e) => {
  // MOVE
  // Calculate circle movement based on mouse position and smoothing
  circle.x += (mouse.x - circle.x) * speed;
  circle.y += (mouse.y - circle.y) * speed;
  // Create a transformation string for cursor translation
  const translateTransform = `translate(${circle.x}px, ${circle.y}px)`;

  // SQUEEZE
  // 1. Calculate the change in mouse position (deltaMouse)
  const deltaMouseX = mouse.x - previousMouse.x;
  const deltaMouseY = mouse.y - previousMouse.y;
  // Update previous mouse position for the next frame
  previousMouse.x = mouse.x;
  previousMouse.y = mouse.y;
  // 2. Calculate mouse velocity using Pythagorean theorem and adjust speed
  const mouseVelocity = Math.min(Math.sqrt(deltaMouseX**2 + deltaMouseY**2) * 4, 150); 
  // 3. Convert mouse velocity to a value in the range [0, 0.5]
  const scaleValue = (mouseVelocity / 150) * 0.5;
  // 4. Smoothly update the current scale
  currentScale += (scaleValue - currentScale) * speed;
  // 5. Create a transformation string for scaling
  const scaleTransform = `scale(${1 + currentScale}, ${1 - currentScale})`;

  // ROTATE
  // 1. Calculate the angle using the atan2 function
  const angle = Math.atan2(deltaMouseY, deltaMouseX) * 180 / Math.PI;
  // 2. Check for a threshold to reduce shakiness at low mouse velocity
  if (mouseVelocity > 20) {
    currentAngle = angle;
  }
  // 3. Create a transformation string for rotation
  const rotateTransform = `rotate(${currentAngle}deg)`;

  // Apply all transformations to the circle element in a specific order: translate -> rotate -> scale
  circleElement.style.transform = `${translateTransform} ${rotateTransform} ${scaleTransform}`;

  // Request the next frame to continue the animation
  window.requestAnimationFrame(tick);
}

// Start the animation loop
tick();</script>
